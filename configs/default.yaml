# Baby Cry Detection Configuration
# Default configuration for training

# Feature extraction settings
# feature_type uses bit flags: FBANK=1, DB=2, MFCC=4, FFT=8
# Combine with OR: 1=FBANK, 3=FBANK+DB, 5=FBANK+MFCC, 7=FBANK+DB+MFCC, 15=ALL
feature:
  feature_type: 3              # 1=FBANK only, 3=FBANK+DB (recommended), 5=FBANK+MFCC
  n_mels: 32                   # Number of mel filters
  n_mfcc: 16                   # Number of MFCC coefficients (used when MFCC enabled)
  n_fft: 1024                  # FFT window size
  hop_length: 500              # Hop length between frames (~31.25ms @ 16kHz)
  fmin: 250                    # Minimum frequency for mel filterbank
  fmax: 8000                   # Maximum frequency for mel filterbank
  preemphasis: 0.95            # Preemphasis coefficient
  use_fbank_norm: true         # Normalize FBank with exponential smoothing
  fbank_decay: 0.9             # FBank normalization decay factor
  use_db_norm: false           # Normalize DB features with moving max
  use_time_delta: false        # Add time delta features
  use_freq_delta: false        # Add frequency delta features

  # Mask configuration (DropBlock augmentation for training)
  mask:
    enable: false              # Enable DropBlock masking
    rate: 0.2                  # Target proportion of features to mask
    prob: 0.5                  # Probability of applying to each instance
    start_epoch: 0             # Epoch to start masking (0 = from beginning)
    end_epoch: -1              # Epoch to end masking (-1 = never end)

# Dataset settings
dataset:
  audio_suffixes:
    - .wav
  sample_rate: 16000           # Target sample rate for audio
  slice_len: 5.0               # Duration of each audio segment (seconds)
  stride: 3.0                  # Stride between segments (seconds)
  cry_rate: 0.5                # Ratio of cry samples in batch
  cache_dir: ./audio_cache     # Directory for caching resampled audio
  force_mono: true             # Convert stereo to mono

# Data augmentation settings
augmentation:
  mixup:
    cry_mix_prob: 0.3          # Probability of applying mixup to cry samples
    cry_mix_rate_mean: 0.3     # Mean mixup rate for cry samples (gaussian sampling)
    cry_mix_rate_std: 0.15     # Std of mixup rate for cry samples
    other_mix_prob: 0.3        # Probability of applying mixup to non-cry samples
    mix_front_prob: 0.7        # Probability of applying mixup before other augmentations

  # Noise augmentation configuration
  noise:
    prob: 0.1                    # Probability of applying noise augmentation
    white_noise_prob: 0.3        # White noise weight
    pink_noise_prob: 0.4         # Pink noise weight (more natural sounding)
    ambient_noise_prob: 0.3      # Ambient/environmental noise weight
    snr_min: 5.0                 # Minimum SNR in dB
    snr_max: 25.0                # Maximum SNR in dB
    pink_noise_alpha: 1.0        # Pink noise spectral decay (1.0 = classic pink)
    ambient_noise_dir: null      # Directory with ambient noise files (null to disable)
    ambient_noise_files: []      # List of specific ambient noise files

  cry_aug_prob: 0.9            # Probability of applying augmentation to cry samples
  other_aug_prob: 0.6          # Probability of applying augmentation to non-cry samples
  other_reverse_prob: 0.5      # Probability of reversing non-cry samples

  # Individual effect probabilities
  pitch_prob: 0.5              # Probability of pitch shift
  reverb_prob: 0.8             # Probability of reverb
  phaser_prob: 0.5             # Probability of phaser effect
  echo_prob: 0.5               # Probability of echo (only for non-cry)
  gain_prob: 0.9               # Probability of gain adjustment
  time_stretch_prob: 0.0       # Probability of time stretching

# Model settings
model:
  model_type: transformer      # Model type
  num_classes: 2               # Number of output classes
  d_model: 256                 # Transformer hidden dimension
  n_heads: 4                   # Number of attention heads
  n_layers: 6                  # Number of transformer layers
  d_ff: 1024                   # Feed-forward dimension
  dropout: 0.1                 # Dropout rate
  attention_dropout: 0.1       # Attention dropout rate
  max_seq_len: 200             # Maximum sequence length
  use_relative_pos: true       # Use relative positional encoding
  attention_type: auto         # Attention type: standard, linear, depthwise, auto
  ffn_type: auto               # FFN type: standard, inverted_bottleneck, auto
  pool_type: mean              # Pooling type: mean, max, attention
  label_smoothing: 0.1         # Label smoothing factor

# Training settings
training:
  batch_size: 32               # Batch size
  num_workers: 4               # Number of data loading workers
  pin_memory: true             # Pin memory for faster GPU transfer
  num_epochs: 100              # Number of training epochs
  grad_clip: 1.0               # Gradient clipping value (null = no clipping)
  early_stopping_patience: 10  # Early stopping patience
  use_augmentation: true       # Use data augmentation
  device: cuda                 # Device to use (cuda/cpu)
  log_interval: 10             # Log every N batches
  val_interval: 1              # Validate every N epochs
  save_best_only: true         # Only save best model

  # Output directory (auto-created subdirs: checkpoints/, logs/, tensorboard/)
  run_dir: runs

  # Optimizer configuration
  optimizer:
    type: adamw                    # Options: 'adamw', 'adam', 'sgd'
    lr: 0.001                      # Learning rate
    weight_decay: 0.00001          # L2 regularization
    betas: [0.9, 0.98]             # Adam beta parameters
    eps: 1.0e-8                    # Adam epsilon

  # Scheduler configuration
  scheduler:
    type: cosine_warmup            # Options: 'cosine_warmup', 'cosine', 'plateau', 'step', 'none'
    warmup_epochs: 5               # Epochs for linear warmup
    min_lr: 0.000001               # Minimum learning rate

  # Loss function configuration
  loss:
    loss_type: combined            # Options: 'cross_entropy', 'focal', 'combined', 'ohem_*'
    focal_alpha: 0.25              # Focal loss alpha parameter
    focal_gamma: 2.0               # Focal loss gamma parameter
    label_smoothing: 0.1           # Label smoothing factor
    focal_weight: 0.5              # Weight for focal loss in combined mode
    ohem_hard_ratio: 0.25          # Ratio of hard examples to keep
    ohem_min_hard_num: 4           # Minimum number of hard examples per batch

  # SpecAugment settings
  use_spec_augment: true
  spec_augment_freq_mask: 8
  spec_augment_time_mask: 20

  # EMA (Exponential Moving Average)
  use_ema: true                    # Enable EMA
  ema_decay: 0.9999                # EMA decay rate
