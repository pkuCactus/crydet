# CryTransformer Medium Configuration
# Lightweight model for edge devices (Raspberry Pi, Edge TPU)

# Feature extraction settings
# feature_type uses bit flags: FBANK=1, DB=2, MFCC=4, FFT=8
# Combine with OR: 1=FBANK, 3=FBANK+DB, 5=FBANK+MFCC, 7=FBANK+DB+MFCC, 15=ALL
feature:
  feature_type: 3              # FBANK + DB (recommended for best performance)
  n_mels: 64                   # Number of mel filters
  n_mfcc: 16                   # Number of MFCC coefficients
  n_fft: 1024                  # FFT window size
  hop_length: 500              # Hop length between frames
  fmin: 200                    # Minimum frequency for mel filterbank
  fmax: 8500                   # Maximum frequency for mel filterbank
  preemphasis: 0.95            # Preemphasis coefficient
  use_fbank_norm: true         # Normalize FBank with exponential smoothing
  fbank_decay: 0.97            # FBank normalization decay factor
  use_db_norm: false           # Normalize DB features with moving max
  use_time_delta: true         # Add time delta features
  use_freq_delta: false        # Add frequency delta features

  # Mask configuration (DropBlock augmentation for training)
  mask:
    enable: true               # Enable DropBlock masking
    rate: 0.2                  # Target proportion of features to mask
    prob: 0.5                  # Probability of applying to each instance
    start_epoch: 20            # Epoch to start masking (0 = from beginning)
    end_epoch: 40              # Epoch to end masking (-1 = never end)

# Dataset settings
dataset:
  audio_suffixes:
    - .wav
  sample_rate: 16000
  slice_len: 5.0
  stride: 3.0
  cry_rate: 0.5
  cache_dir: ./audio_cache
  force_mono: true

# Data augmentation settings
augmentation:
  mixup:
    cry_mix_prob: 0.4
    cry_mix_rate_mean: 0.3
    cry_mix_rate_std: 0.15
    other_mix_prob: 0.3
    mix_front_prob: 0.7
  # Noise augmentation configuration
  noise:
    prob: 0.15                 # Probability of applying noise augmentation
    white_noise_prob: 0.3      # White noise weight
    pink_noise_prob: 0.5       # Pink noise weight (more natural sounding)
    ambient_noise_prob: 0.2    # Ambient/environmental noise weight
    snr_min: 5.0               # Minimum SNR in dB
    snr_max: 25.0              # Maximum SNR in dB
    pink_noise_alpha: 1.0      # Pink noise spectral decay (1.0 = classic pink)
    ambient_noise_dir: null    # Directory with ambient noise files (null to disable)
    ambient_noise_files: []    # List of specific ambient noise files
  cry_aug_prob: 0.6
  other_aug_prob: 0.6
  other_reverse_prob: 0.5
  pitch_prob: 0.7
  reverb_prob: 0.8
  phaser_prob: 0.5
  echo_prob: 0.5
  time_stretch_prob: 0.3
  gain_prob: 0.9

# Model settings
# Architecture is controlled by layer parameters (d_model, n_layers, n_heads)
# Set attention_type and ffn_type to 'auto' for automatic selection based on size
model:
  model_type: transformer
  num_classes: 2

  # Core architecture parameters - adjust these to control model size
  d_model: 256              # Hidden dimension (larger = more capacity)
  n_heads: 4                # Attention heads (must divide d_model)
  n_layers: 6               # Number of transformer layers (deeper = more capacity)
  d_ff: 1024                # Feed-forward dimension (typically 2-4x d_model)
  dropout: 0.1
  attention_dropout: 0.1

  # Positional encoding
  max_seq_len: 200
  use_relative_pos: true

  # Attention and FFN types: 'standard', 'linear', 'depthwise', 'inverted_bottleneck', or 'auto'
  # When set to 'auto', efficient variants are selected for smaller models
  attention_type: auto
  ffn_type: auto

  # Pooling: 'mean', 'max', 'attention'
  pool_type: attention

  # Label smoothing for training
  label_smoothing: 0.1

# Training settings
training:
  batch_size: 256
  num_workers: 8
  pin_memory: true
  # DataLoader performance tuning
  prefetch_factor: 4           # Prefetch batches per worker (higher = more memory, better throughput)
  persistent_workers: true     # Keep workers alive between epochs (single GPU only, disabled for DDP)
  num_epochs: 100
  grad_clip: 5.0
  early_stopping_patience: 15
  use_augmentation: true
  device: cuda
  log_interval: 10
  val_interval: 1
  save_best_only: true

  # Output directory (auto-created subdirs: checkpoints/, logs/, tensorboard/)
  run_dir: runs

  # Optimizer configuration
  optimizer:
    type: adamw                    # Options: 'adamw', 'adam', 'sgd'
    lr: 0.001                      # Learning rate
    weight_decay: 0.01             # L2 regularization
    betas: [0.9, 0.98]             # Adam beta parameters
    eps: 1.0e-8                    # Adam epsilon for numerical stability
    momentum: 0.9                  # SGD momentum (only for SGD)
    nesterov: false                # SGD Nesterov momentum (only for SGD)

  # Learning rate scheduler configuration
  scheduler:
    type: cosine_warmup            # Options: 'cosine_warmup', 'cosine', 'plateau', 'step', 'none'
    warmup_epochs: 0               # Epochs for linear warmup (used if warmup_steps=0)
    warmup_steps: 10000            # Steps for linear warmup (0 = use warmup_epochs)
    min_lr: 0.000001               # Minimum learning rate
    decay_epochs: 0                # Epochs for cosine decay after warmup (0 = auto)
    # Step scheduler settings
    step_size: 30                  # Epochs between LR decay (for 'step')
    gamma: 0.1                     # LR decay factor (for 'step')
    # Plateau scheduler settings
    plateau_mode: max              # 'max' or 'min' (for 'plateau')
    plateau_factor: 0.5            # LR reduction factor (for 'plateau')
    plateau_patience: 5            # Epochs to wait before reducing LR (for 'plateau')

  # SpecAugment settings
  use_spec_augment: false
  spec_augment_freq_mask: 8
  spec_augment_time_mask: 20

  # Loss function configuration
  loss:
    loss_type: combined         # Options: 'cross_entropy', 'focal', 'label_smoothing', 'combined', 'ohem_focal', 'ohem_ce', 'ohem_combined'
    focal_alpha: 0.25           # Focal loss alpha parameter
    focal_gamma: 2.0            # Focal loss gamma parameter
    label_smoothing: 0.1        # Label smoothing factor
    focal_weight: 0.5           # Weight for focal loss in combined mode
    # OHEM parameters (used when loss_type starts with 'ohem_')
    ohem_hard_ratio: 0.25       # Ratio of hard examples to keep
    ohem_min_hard_num: 4        # Minimum number of hard examples per batch

  # SWA (Stochastic Weight Averaging)
  use_swa: true
  swa_start: 50
  swa_lr: 5e-5

  # EMA (Exponential Moving Average)
  use_ema: true                 # Enable EMA for model parameter averaging
  ema_decay: 0.9999             # EMA decay rate (closer to 1 = slower update)
